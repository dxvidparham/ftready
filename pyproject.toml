[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"

[project]
name = "ftready"
version = "0.1.0"
description = "Check if your Python project dependencies are ready for free-threaded Python (3.13t/3.14t)"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "David Anthony Parham" }]
keywords = ["free-threading", "gil", "nogil", "compatibility", "dependencies"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]

[project.optional-dependencies]
rich = ["rich>=13.0"]

[project.urls]
Homepage = "https://github.com/dparham/ftready"
Repository = "https://github.com/dparham/ftready"

[project.scripts]
ftready = "ftready.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ftready"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "DTZ", "T20", "ICN", "PIE", "PT", "RSE", "RET", "SIM", "TID", "TCH", "ARG", "PTH", "ERA"]
ignore = ["S310"]

[tool.ruff.lint.isort]
known-first-party = ["ftready"]

[tool.pytest.ini_options]
testpaths = ["tests"]
