name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

# Least-privilege defaults; jobs escalate individually
permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build --no-sources

      - name: Generate subject hashes for SLSA provenance
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-install:
    name: Verify installation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Test install from wheel
        run: |
          uv venv --python 3.12
          uv pip install dist/*.whl
          uv run python -c "import ftready; print('ftready imported successfully')"

  # --------------------------------------------------------------- #
  # SLSA Build Level 3 provenance via slsa-framework                #
  # --------------------------------------------------------------- #
  provenance:
    name: Generate SLSA provenance
    needs: build
    permissions:
      actions: read
      contents: write
      id-token: write # OIDC for SLSA
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
      compile-generator: true

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, test-install, provenance]
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write
      attestations: write # Sigstore attestations
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate Sigstore attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          attestations: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, test-install, provenance, publish-testpypi]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      attestations: write # Sigstore attestations
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate Sigstore attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
